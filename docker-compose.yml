version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickdrop-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - quickdrop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=QuickDrop
        - SERVICE_URL_BACKEND=${SERVICE_URL_BACKEND}
    container_name: quickdrop-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    healthcheck:
      # Node 20 has native fetch. Test the home page.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001').then(r => {if(!r.ok) process.exit(1)}).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quickdrop_network

networks:
  quickdrop_network:
    driver: bridge
