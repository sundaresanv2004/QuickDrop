version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      # Pass the public backend URL for the client to connect
      # In a production environment like Coolify, you should inject the real domain here
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001/ws
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    restart: unless-stopped
