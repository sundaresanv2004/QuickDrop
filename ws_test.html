<!DOCTYPE html>
<html>
<head>
<title>WebSocket Test</title>
<style>
  body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 20px; }
  .header { text-align: center; margin-bottom: 20px; }
  .panels { display: flex; gap: 20px; }
  .panel { flex: 1; border: 1px solid #444; padding: 15px; border-radius: 8px; }
  .log-box { font-family: monospace; background: #111; height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #333; margin: 10px 0; white-space: pre-wrap; word-wrap: break-word; }
  .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
  .badge.connected { background: #2e7d32; color: white; }
  .badge.disconnected { background: #c62828; color: white; }
  input[type="text"] { width: calc(100% - 100px); padding: 8px; background: #222; color: white; border: 1px solid #555; }
  button { padding: 8px 15px; background: #333; color: white; border: 1px solid #555; cursor: pointer; }
  button:hover { background: #444; }
</style>
</head>
<body>
  <div class="header">
    <button id="disconnect-all">Disconnect All</button>
  </div>
  <div class="panels">
    <div class="panel" id="panel-a">
      <h3>Device A</h3>
      <div id="badge-a" class="badge disconnected">Disconnected</div><br>
      <button id="connect-a">Connect</button>
      <div id="log-a" class="log-box"></div>
      <div>
        <input type="text" id="input-a" placeholder='{"type": "...", "to": "..."}'>
        <button id="send-a">Send Raw</button>
      </div>
    </div>
    <div class="panel" id="panel-b">
      <h3>Device B</h3>
      <div id="badge-b" class="badge disconnected">Disconnected</div><br>
      <button id="connect-b">Connect</button>
      <div id="log-b" class="log-box"></div>
      <div>
        <input type="text" id="input-b" placeholder='{"type": "...", "to": "..."}'>
        <button id="send-b">Send Raw</button>
      </div>
    </div>
  </div>

<script>
  function setupPanel(panelId, deviceName) {
    let ws = null;
    const badge = document.getElementById(`badge-${panelId}`);
    const connectBtn = document.getElementById(`connect-${panelId}`);
    const sendBtn = document.getElementById(`send-${panelId}`);
    const inputField = document.getElementById(`input-${panelId}`);
    const logBox = document.getElementById(`log-${panelId}`);

    function log(msg, type = "info") {
      const now = new Date();
      const timeStr = now.toLocaleTimeString();
      const div = document.createElement("div");
      let typeStr = type;
      if (typeof msg !== 'string') {
        typeStr = msg.type || type;
        msg = JSON.stringify(msg, null, 2);
      }
      div.textContent = `[${timeStr}] ${typeStr}: \n${msg}`;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    connectBtn.onclick = () => {
      if (ws) ws.close();
      ws = new WebSocket("ws://localhost:8000/ws/connect");

      ws.onopen = () => {
        badge.className = "badge connected";
        badge.textContent = "Connected";
        ws.send(JSON.stringify({ type: "register", device_name: deviceName }));
        log("WebSocket Opened", "system");
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          log(data);
        } catch (err) {
          log(`Error parsing JSON: ${e.data}`, "error");
        }
      };

      ws.onclose = () => {
        badge.className = "badge disconnected";
        badge.textContent = "Disconnected";
        log("WebSocket Closed", "system");
        ws = null;
      };

      ws.onerror = (e) => {
        log("WebSocket Error", "error");
      };
    };

    sendBtn.onclick = () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("Cannot send: not connected", "error");
        return;
      }
      try {
        const data = JSON.parse(inputField.value);
        ws.send(JSON.stringify(data));
        log("Sent raw message", "system");
      } catch (err) {
        log("Invalid JSON", "error");
      }
    };

    return () => {
      if (ws) {
        ws.close();
        ws = null;
      }
    };
  }

  const disconnectA = setupPanel("a", "Test Device A");
  const disconnectB = setupPanel("b", "Test Device B");

  document.getElementById("disconnect-all").onclick = () => {
    disconnectA();
    disconnectB();
  };
</script>
</body>
</html>
