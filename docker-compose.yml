version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickdrop-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    networks:
      - quickdrop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=QuickDrop
    container_name: quickdrop-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # In production/deployment, WebSocket URL must point to the public domain connecting to the backend.
      # Coolify handles absolute routing. If we leave WS_URL empty, frontend dynamically constructs 
      # ws://[CURRENT_DOMAIN]:8000/api. Next.js standalone server needs this explicitly at runtime if changed.
      - NEXT_PUBLIC_WS_URL=
    depends_on:
      - backend
    networks:
      - quickdrop_network

networks:
  quickdrop_network:
    driver: bridge
